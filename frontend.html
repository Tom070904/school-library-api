<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TS Academy Library • Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(156, 154, 154, 0.1); }
  </style>
</head>
<body class="bg-gray-950 text-gray-200">

<div class="flex h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-gray-900 border-r border-gray-800 p-6 flex flex-col">
    <div class="flex items-center gap-3 mb-10">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl">📚</div>
      <h1 class="text-2xl font-bold">Library System</h1>
    </div>
    
    <nav class="space-y-2">
      <button onclick="showSection('dashboard')" class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-gray-800 active">
        <i class="fas fa-home"></i> Dashboard
      </button>
      <button onclick="showSection('authors')" class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-gray-800">
        <i class="fas fa-user-tie"></i> Authors
      </button>
      <button onclick="showSection('books')" class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-gray-800">
        <i class="fas fa-book"></i> Books
      </button>
      <button onclick="showSection('students')" class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-gray-800">
        <i class="fas fa-user-graduate"></i> Students
      </button>
      <button onclick="showSection('attendants')" class="nav-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-gray-800">
        <i class="fas fa-user-shield"></i> Attendants
      </button>
    </nav>

    <div class="mt-auto text-xs text-gray-500">
      Backend: <span class="text-green-400">Connected</span><br>
      <span id="status" class="text-emerald-400">Ready</span>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 overflow-auto">

    <!-- Dashboard -->
    <div id="dashboard" class="section p-8">
      <h1 class="text-4xl font-bold mb-8">Welcome to the Library Dashboard</h1>
      <div class="grid grid-cols-4 gap-6">
        <div class="bg-gray-900 rounded-3xl p-6 card-hover">
          <h3 class="text-gray-400">Total Books</h3>
          <p id="total-books" class="text-5xl font-bold text-blue-400 mt-2">0</p>
        </div>
        <div class="bg-gray-900 rounded-3xl p-6 card-hover">
          <h3 class="text-gray-400">Borrowed Books</h3>
          <p id="borrowed-books" class="text-5xl font-bold text-orange-400 mt-2">0</p>
        </div>
        <div class="bg-gray-900 rounded-3xl p-6 card-hover">
          <h3 class="text-gray-400">Students</h3>
          <p id="total-students" class="text-5xl font-bold text-purple-400 mt-2">0</p>
        </div>
        <div class="bg-gray-900 rounded-3xl p-6 card-hover">
          <h3 class="text-gray-400">Authors</h3>
          <p id="total-authors" class="text-5xl font-bold text-teal-400 mt-2">0</p>
        </div>
      </div>
    </div>

    <!-- Authors Section -->
    <div id="authors" class="section hidden p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-semibold">Authors</h2>
        <button onclick="showCreateModal('author')" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl font-medium">+ New Author</button>
      </div>
      <div id="authors-list" class="grid grid-cols-3 gap-6"></div>
    </div>

    <!-- Books Section (Most Important) -->
    <div id="books" class="section hidden p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-semibold">Books</h2>
        <button onclick="showCreateModal('book')" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl font-medium">+ New Book</button>
      </div>
      <div id="books-list" class="grid grid-cols-3 gap-6"></div>
    </div>

    <!-- Students & Attendants (simple tables) -->
    <div id="students" class="section hidden p-8">
      <h2 class="text-3xl font-semibold mb-6">Students</h2>
      <table class="w-full bg-gray-900 rounded-3xl overflow-hidden">
        <thead><tr class="bg-gray-800"><th class="py-4 px-6 text-left">Name</th><th class="py-4 px-6 text-left">Email</th><th class="py-4 px-6 text-left">Student ID</th></tr></thead>
        <tbody id="students-table" class="text-sm"></tbody>
      </table>
    </div>

    <div id="attendants" class="section hidden p-8">
      <h2 class="text-3xl font-semibold mb-6">Library Attendants</h2>
      <table class="w-full bg-gray-900 rounded-3xl overflow-hidden">
        <thead><tr class="bg-gray-800"><th class="py-4 px-6 text-left">Name</th><th class="py-4 px-6 text-left">Staff ID</th></tr></thead>
        <tbody id="attendants-table" class="text-sm"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- Create Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-gray-900 rounded-3xl p-8 w-full max-w-md">
    <h3 id="modal-title" class="text-2xl font-semibold mb-6"></h3>
    <div id="modal-content" class="space-y-4"></div>
    <div class="flex gap-4 mt-8">
      <button onclick="hideModal()" class="flex-1 py-4 rounded-2xl border border-gray-700 hover:bg-gray-800">Cancel</button>
      <button onclick="submitForm()" class="flex-1 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700">Save</button>
    </div>
  </div>
</div>

<script>
// Backend URL
const API = 'http://localhost:5000/api';

// Current form data
let currentFormType = '';
let currentBookId = null;

// Show section
function showSection(section) {
  document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
  document.getElementById(section).classList.remove('hidden');
  loadData();
}

// Load all data
async function loadData() {
  await loadDashboard();
  await loadAuthors();
  await loadBooks();
  await loadStudents();
  await loadAttendants();
}

// Dashboard summary
async function loadDashboard() {
  const books = await fetch(`${API}/books`).then(r => r.json());
  const students = await fetch(`${API}/students`).then(r => r.json());
  const authors = await fetch(`${API}/authors`).then(r => r.json());

  document.getElementById('total-books').textContent = books.length;
  document.getElementById('borrowed-books').textContent = books.filter(b => b.status === 'OUT').length;
  document.getElementById('total-students').textContent = students.length;
  document.getElementById('total-authors').textContent = authors.length;
}

// Authors
async function loadAuthors() {
  const res = await fetch(`${API}/authors`);
  const authors = await res.json();
  const container = document.getElementById('authors-list');
  container.innerHTML = authors.map(a => `
    <div class="bg-gray-900 rounded-3xl p-6 card-hover">
      <h4 class="font-semibold text-lg">${a.name}</h4>
      <p class="text-gray-400 text-sm mt-2">${a.bio || 'No bio provided'}</p>
    </div>
  `).join('');
}

// Books
async function loadBooks() {
  const res = await fetch(`${API}/books`);
  const books = await res.json();
  const container = document.getElementById('books-list');
  container.innerHTML = books.map(book => `
    <div class="bg-gray-900 rounded-3xl p-6 card-hover">
      <div class="flex justify-between">
        <h4 class="font-semibold text-lg">${book.title}</h4>
        <span class="px-3 py-1 text-xs font-medium rounded-2xl ${book.status === 'IN' ? 'bg-green-500' : 'bg-orange-500'}">${book.status}</span>
      </div>
      <p class="text-gray-400 text-sm mt-1">ISBN: ${book.isbn}</p>
      ${book.authors && book.authors.length ? `<p class="text-xs text-gray-500 mt-3">By: ${book.authors.map(a => a.name).join(', ')}</p>` : ''}
      
      ${book.status === 'OUT' && book.borrowedBy ? `
        <div class="mt-4 text-xs bg-gray-800 rounded-2xl p-3">
          Borrowed by: <strong>${book.borrowedBy.name}</strong><br>
          Issued by: ${book.issuedBy?.name}<br>
          Return: ${new Date(book.returnDate).toLocaleDateString()}
        </div>
      ` : ''}
      
      <div class="mt-6 flex gap-2">
        ${book.status === 'IN' ? `<button onclick="borrowBook('${book._id}')" class="flex-1 bg-orange-600 hover:bg-orange-700 py-2 rounded-2xl text-sm">Borrow</button>` : ''}
        ${book.status === 'OUT' ? `<button onclick="returnBook('${book._id}')" class="flex-1 bg-green-600 hover:bg-green-700 py-2 rounded-2xl text-sm">Return</button>` : ''}
        <button onclick="deleteBook('${book._id}')" class="px-4 text-red-400">🗑</button>
      </div>
    </div>
  `).join('');
}

async function borrowBook(bookId) {
  const studentId = prompt("Enter Student ID (long _id from Students):");
  const attendantId = prompt("Enter Attendant ID (long _id from Attendants):");
  const returnDate = prompt("Return Date (YYYY-MM-DD):", "2026-04-15");
  
  if (!studentId || !attendantId) return alert("Missing ID");
  
  const res = await fetch(`${API}/books/${bookId}/borrow`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ studentId, attendantId, returnDate })
  });
  
  const data = await res.json();
  alert(data.message || 'Success!');
  loadBooks();
}

async function returnBook(bookId) {
  const res = await fetch(`${API}/books/${bookId}/return`, { method: 'POST' });
  const data = await res.json();
  alert(data.message || 'Book returned!');
  loadBooks();
}

async function deleteBook(id) {
  if (confirm("Delete this book?")) {
    await fetch(`${API}/books/${id}`, { method: 'DELETE' });
    loadBooks();
  }
}

// Students & Attendants
async function loadStudents() {
  const res = await fetch(`${API}/students`);
  const students = await res.json();
  const tbody = document.getElementById('students-table');
  tbody.innerHTML = students.map(s => `
    <tr class="border-t border-gray-800">
      <td class="py-4 px-6">${s.name}</td>
      <td class="py-4 px-6">${s.email}</td>
      <td class="py-4 px-6">${s.studentId}</td>
    </tr>
  `).join('');
}

async function loadAttendants() {
  const res = await fetch(`${API}/attendants`);
  const attendants = await res.json();
  const tbody = document.getElementById('attendants-table');
  tbody.innerHTML = attendants.map(a => `
    <tr class="border-t border-gray-800">
      <td class="py-4 px-6">${a.name}</td>
      <td class="py-4 px-6">${a.staffId}</td>
    </tr>
  `).join('');
}

// Modal for creating new items
function showCreateModal(type) {
  currentFormType = type;
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const content = document.getElementById('modal-content');

  modal.classList.remove('hidden');

  if (type === 'author') {
    title.textContent = 'Create New Author';
    content.innerHTML = `
      <input id="name" class="w-full bg-gray-800 rounded-2xl px-4 py-4" placeholder="Author Name" required>
      <textarea id="bio" class="w-full bg-gray-800 rounded-2xl px-4 py-4 h-24" placeholder="Bio (optional)"></textarea>
    `;
  } else if (type === 'book') {
    title.textContent = 'Create New Book';
    content.innerHTML = `
      <input id="title" class="w-full bg-gray-800 rounded-2xl px-4 py-4" placeholder="Book Title" required>
      <input id="isbn" class="w-full bg-gray-800 rounded-2xl px-4 py-4" placeholder="ISBN" required>
      <input id="authors" class="w-full bg-gray-800 rounded-2xl px-4 py-4" placeholder="Author IDs (comma separated)" required>
    `;
  }
}

function hideModal() {
  document.getElementById('modal').classList.add('hidden');
}

async function submitForm() {
  const modal = document.getElementById('modal');

  if (currentFormType === 'author') {
    const name = document.getElementById('name').value;
    const bio = document.getElementById('bio').value;
    await fetch(`${API}/authors`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, bio })
    });
    loadAuthors();
  } 
  else if (currentFormType === 'book') {
    const title = document.getElementById('title').value;
    const isbn = document.getElementById('isbn').value;
    const authors = document.getElementById('authors').value.split(',').map(id => id.trim());
    await fetch(`${API}/books`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, isbn, authors })
    });
    loadBooks();
  }

  hideModal();
  loadData();
}

// Initial load
showSection('dashboard');
</script>

</body>
</html>
